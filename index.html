<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VIVE</title>

  <!-- Style -->
  <link rel="stylesheet" href="/css/style.css">

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

</head>
<body>
  <!-- Navbar -->
  <nav class="navbar">
    <div class="navbar__container container">
      <!-- Navbar menu -->
      <ul class="navbar__menu">
        <li class="navbar__item"><a href="" class="navbar__link">Home</a></li>
        <li class="navbar__item"><a href="" class="navbar__link">Shop</a></li>
        <li class="navbar__item"><a href="" class="navbar__link">Catalog</a></li>
        <li class="navbar__item"><a href="" class="navbar__link">Faq</a></li>
        <li class="navbar__item"><a href="" class="navbar__link">Contact</a></li>
      </ul>

      <!-- Navbar logo -->
      <div class="navbar__logo">
        <a href="index.html" class="navbar__logo-link">
          <img src="/assets/images/logo.png" alt="logo" class="navbar__logo-img">
          VIVE
        </a>
      </div>

      <!-- Navbar Actions -->
      <div class="navbar__actions">
        <!-- Search -->
        <form class="navbar__search">
          <input 
            type="search" 
            placeholder="Search in store!" 
            class="navbar__search-input"
          >
          <button type="submit" class="navbar__search-button">
            <i class="bi bi-search"></i>
          </button>
        </form>

        <!-- Icons -->
        <div class="navbar__icons">
          <button class="navbar__icon"><i class="bi bi-heart"></i></button>
          <button class="navbar__icon navbar__icon--blue"><i class="bi bi-cart2"></i></button>
        </div>

        <!-- Profile -->
        <div class="navbar__profile">
          <img src="/assets/images/perfil.png" alt="User" class="navbar__profile-img">
          <div class="navbar__profile-info">
            <span class="navbar__profile-name">Steven Wilson</span>
            <a href="#" class="navbar__profile-link">
              Visit profile <i class="bi bi-arrow-right"></i>
            </a>
          </div>
        </div>
      </div>
    </div>
  </nav>
  <!-- Hero Section -->
  <section class="hero">
    <div class="hero__box"> 
    <div class="hero__background-wrapper">
        <span class="hero__background-text">VIVE</span>
      </div>
      <div class="hero__container container">
        <div class="hero__content">
          <h1 class="hero__title">FASHION FOR NOW AND FOREVER WITH <span class="hero__title-accent">VIVE</span></h1>
          <p class="hero__description">Embark on a journey where futuristic fashion and cutting-edge technology fuse seamlessly in harmonious style.</p>
          <div class="hero__actions">
            <a href="#" class="hero__button hero__button--dark">Explore collection <i class="bi bi-arrow-up-right"></i></a>
            <a href="#" class="hero__button hero__button--light">About us <i class="bi bi-arrow-right"></i></a>
          </div>
        </div>
        <div class="hero__image-wrapper">
          <img class="hero__image" src="/assets/images/hero-img.png" alt="hero-image">
        </div>
      </div>
    </div>
  </section>
</body>
</html>
